<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://p.trellocdn.com/power-up.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <script>
      var BASE_URL = 'https://syk3s.github.io/trello-echarts-powerup';

      TrelloPowerUp.initialize({
        'card-back-section': function (t, options) {
          return {
            title: 'Média de Views',
            icon: BASE_URL + '/icon.svg',
            content: {
              type: 'iframe',
              url: t.signUrl(BASE_URL + '/card-back.html'),
              height: 400,
            },
          };
        },
      });
    </script>
  </body>
</html>
