<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://syk3s.github.io/trello-echarts-powerup/power-up.min.js"></script>
  </head>
  <body>
    <script>
      var BASE_URL = 'https://syk3s.github.io/trello-echarts-powerup';

      TrelloPowerUp.initialize({
        'card-detail-badges': function (t, options) {
          return [
            {
              title: 'Views',
              text: 'ECharts OK',
              color: 'green',
            },
          ];
        },
        'card-back-section': function (t, options) {
          return {
            title: 'Média de Views',
            icon: BASE_URL + '/icon.svg',
            content: {
              type: 'iframe',
              url: t.signUrl(BASE_URL + '/card-back.html'),
              height: 400,
            },
          };
        },
      });
    </script>
  </body>
</html>
